# Config for macros.py.
# location can be:
# $XDG_CONFIG_HOME/macros/config.toml 
# ~/.config/macros/config.toml
# MACRO_DIR env var

# Directory containing snippet files (one snippet per file).
macro_dir = "~/Snippets/"

# Where pick-frequency stats (for sorting snippets by recency/usage) are stored.
usage_file = "~/Snippets/macro-usage.json"

# Seconds of inactivity before a tab-stop cycling session gives up and
# releases the keyboard grab.
select_timeout = 10.0

# Seconds to pause at each settle point (after creating the virtual
# keyboard/before grabbing devices, before typing the snippet, before
# starting tab-stop navigation).
sleep = 0.05
